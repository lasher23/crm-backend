<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>CRM</h1>
    <nav class="mode-toggle">
      <button id="btn-mode-ui" class="mode-btn">UI</button>
      <button id="btn-mode-api" class="mode-btn active">API</button>
    </nav>
  </header>

  <!-- UI MODE -->
  <main id="ui-mode" class="hidden">
    <section id="customer-list-section">
      <div class="section-header">
        <h2>Customers</h2>
        <button id="btn-refresh">Refresh</button>
        <button id="btn-add" class="primary">+ Add Customer</button>
      </div>
      <div id="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Role</th><th>Email</th><th>Phone</th><th>Contacted</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="customer-table-body">
            <tr><td colspan="6" class="empty">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section id="form-section" class="hidden">
      <h2 id="form-title">Add Customer</h2>
      <form id="customer-form">
        <input type="hidden" id="field-id" />
        <div class="form-group">
          <label for="field-name">Name *</label>
          <input type="text" id="field-name" placeholder="Full name" required />
        </div>
        <div class="form-group">
          <label for="field-role">Role</label>
          <input type="text" id="field-role" placeholder="Job title" />
        </div>
        <div class="form-group">
          <label for="field-email">Email</label>
          <input type="email" id="field-email" placeholder="email@example.com" />
        </div>
        <div class="form-group">
          <label for="field-phone">Phone</label>
          <input type="number" id="field-phone" placeholder="Phone number" />
        </div>
        <div class="form-group checkbox-group">
          <label><input type="checkbox" id="field-contacted" /> Contacted</label>
        </div>
        <div class="form-actions">
          <button type="submit" class="primary">Save</button>
          <button type="button" id="btn-cancel">Cancel</button>
        </div>
      </form>
    </section>
  </main>

  <!-- API MODE -->
  <main id="api-mode">
    <div class="api-header-bar">
      <div>
        <h2>CRM REST API</h2>
        <p class="api-base-url">Base URL: <code id="base-url-display">http://localhost:3003</code></p>
      </div>
    </div>
    <div id="api-endpoints"></div>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
